<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gtui — gmail tui</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0a; color:#33ff33;
  font-family:'JetBrains Mono',monospace;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
/* CRT scan lines */
body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,255,0,.03) 0,rgba(0,0,0,.03) 1px,transparent 2px);
  pointer-events:none; z-index:999;
}
/* CRT flicker */
@keyframes flicker {
  0%,100%{opacity:1}
  3%{opacity:.85}
  6%{opacity:.95}
  8%{opacity:.7}
  10%{opacity:.95}
  93%{opacity:.9}
  95%{opacity:.7}
  97%{opacity:.9}
}
.terminal {
  animation:flicker 8s infinite;
  background:#0d0d0d; border:1px solid #33ff33;
  border-radius:4px; padding:2rem; width:90%; max-width:700px;
  position:relative; z-index:1;
  box-shadow:0 0 30px rgba(0,255,0,.1),inset 0 0 30px rgba(0,255,0,.02);
}
/* scan line shadow over terminal */
.terminal::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,.02) 2px,rgba(0,255,0,.02) 3px);
  pointer-events:none; border-radius:4px;
}
.prompt { color:#33ff33; font-weight:700; }
.cursor { animation:blink 1s step-end infinite; }
@keyframes blink { 50%{opacity:0} }
.line { margin:.3rem 0; white-space:pre-wrap; word-break:break-all; }
.dim { color:#1a7a1a; }
.green { color:#33ff33; }
.gray { color:#555; }
.a { color:#0f0; text-decoration:none; }
.a:hover { text-shadow:0 0 10px #33ff33; }
.typing { overflow:hidden; border-right:2px solid #33ff33; white-space:nowrap; animation:typing 2s steps(30) forwards; width:0; }
@keyframes typing { to{width:100%} }
.spacer { height:1rem; }
</style>
</head>
<body>
<div class="terminal">
<div class="line"><span class="prompt">$</span> <span class="typing" style="display:inline-block">cat /home/gtui/README.md</span></div>
<div class="spacer"></div>
<div class="line"><span class="dim"># GTUI — Gmail TUI</span></div>
<div class="line"><span class="dim"># Terminal client for Gmail</span></div>
<div class="spacer"></div>
<div class="line"><span class="prompt">$</span> ls features/</div>
<div class="line">  read/     send/     modify/     themes/</div>
<div class="spacer"></div>
<div class="line"><span class="prompt">$</span> cat features/themes</div>
<div class="line"><span class="dim">9 Mocha accent variants</span></div>
<div class="line">  mauve  blue  pink  green  peach</div>
<div class="line">  red    teal  rosewater  yellow</div>
<div class="spacer"></div>
<div class="line"><span class="prompt">$</span> uptime</div>
<div class="line">  active · responsive · nerd font icons</div>
<div class="spacer"></div>
<div class="line"><span class="prompt">$</span> <span class="cursor">▊</span></div>
<div class="spacer"></div>
<div class="line"><span class="dim">[1] <a class="a" href="https://github.com/OfficalConus/gtui">git clone</a></span></div>
<div class="line"><span class="dim">[2] <a class="a" href="https://github.com/OfficalConus/gtui/releases">download</a></span></div>
</div>
</body>
</html>
